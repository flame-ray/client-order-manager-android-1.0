name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - name: Install Gradle
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-8.7/bin" >> "$GITHUB_PATH"
      - name: Build debug APK
        run: gradle -p android assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          # ASCII-only names avoid artifact upload failures on GitHub Actions.
          name: client-order-manager-1.0-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
