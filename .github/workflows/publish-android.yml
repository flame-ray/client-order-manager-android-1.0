name: Publish Android Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - name: Install Gradle
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-8.7/bin" >> "$GITHUB_PATH"
      - name: Build release APK
        run: |
          gradle -p android assembleDebug
          cp android/app/build/outputs/apk/debug/app-debug.apk client-order-manager-android-1.0.apk
      - name: Update v1.0 Android release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-android
          name: Client Order Manager Android 1.0
          files: client-order-manager-android-1.0.apk
          overwrite_files: true
          fail_on_unmatched_files: true
