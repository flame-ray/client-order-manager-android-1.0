name: Publish Android v1.0

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Keep Android-only files
        run: |
          git rm -f -- app.py icon.ico make_icon.py requirements.txt
          git rm -rf -- release
          cat > README.md <<'EOF'
          # Client Order Manager Android 1.0

          Offline Android client and order manager.

          ## Features

          - Local-only client, order and payment records
          - Global search and rotating quotes
          - Touch feedback and offline storage

          ## Build

          The Android Gradle project is in the android directory.

          ## Download

          Download the APK from this repository's Releases page.
          EOF
          cat > .gitignore <<'EOF'
          .gradle/
          **/build/
          local.properties
          *.apk
          *.aab
          EOF
          git rm -rf -- .github/workflows/publish-android-v1.yml
          git rm -f -- .github/workflows/release-android-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Split Android into standalone repository"
            git push origin HEAD:main
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - name: Install Gradle
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-8.7/bin" >> "$GITHUB_PATH"
      - name: Build APK
        run: gradle -p android assembleDebug
      - name: Prepare release asset
        run: cp android/app/build/outputs/apk/debug/app-debug.apk client-order-manager-android-1.0.apk
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-android
          target_commitish: main
          name: Client Order Manager Android 1.0
          body: Offline Android release of Client Order Manager 1.0.
          files: client-order-manager-android-1.0.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
